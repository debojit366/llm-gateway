
services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-gateway-container
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/code/app
    depends_on:
      - redis         
    restart: always

  redis:
    image: redis:7-alpine
    container_name: llm-gateway-redis
    ports:
      - "6379:6379"   
    restart: always